name: Appium E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Show Trigger Info
        run: |
          echo "This workflow was triggered by a pull request update."
          echo "Committer/Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build Flutter APK
        run: flutter build apk --debug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium & Dependencies
        run: |
          cd appium_tests
          npm install
          npm i -g appium

      - name: Start Appium Server
        run: |
          appium &
        env:
          APPIUM_PORT: 4723

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: Nexus 6
          script: cd appium_tests && export DEVICE_NAME=emulator-5554 && npm test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: appium_tests/queueless_test_report.xlsx
