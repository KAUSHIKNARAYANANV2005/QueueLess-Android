name: Load Performance Test

on:
  workflow_dispatch:

jobs:
  performance-tests:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r performance_tests/requirements.txt

      - name: Run Performance Tests
        run: python performance_tests/run_performance_tests.py

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: queueless-performance-reports
          path: android-performance-reports/
          retention-days: 7
