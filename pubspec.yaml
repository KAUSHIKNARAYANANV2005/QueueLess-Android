name: queueless
description: Smart AI-Powered Queue Management App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase - upgraded to v5/v12 which fixes web JS interop TypeErrors
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  # Auth Providers
  google_sign_in: ^6.2.1
  # State Management & Navigation
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  go_router: ^13.2.3
  # Networking
  dio: ^5.4.3
  http: ^1.6.0
  shared_preferences: ^2.2.3
  # UI & Animations
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  animations: ^2.0.11
  # Charts & Data
  fl_chart: ^0.67.0
  table_calendar: ^3.1.0
  qr_flutter: ^4.1.0
  # Payments - Android/iOS only (not web)
  razorpay_flutter: ^1.4.5
  # AI
  google_generative_ai: ^0.4.3
  # Notifications & Media
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: 10.1.2
  iconsax: ^0.0.8
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
